<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>27 - Mini Redux</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    h1 { margin-bottom: 8px; }
    p.desc { color: #666; margin-bottom: 24px; }
    .app-layout { display: flex; gap: 20px; }
    .main-panel { flex: 1; max-width: 500px; }
    .counter-section { background: #fff; border-radius: 10px; padding: 24px; border: 1px solid #e0e0e0; margin-bottom: 16px; }
    .counter-section h3 { font-size: 13px; color: #888; text-transform: uppercase; margin-bottom: 14px; }
    .count-display { font-size: 48px; font-weight: 700; color: #4f46e5; text-align: center; padding: 16px 0; }
    .btn-row { display: flex; gap: 8px; justify-content: center; }
    button { padding: 9px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #e5e7eb; color: #333; }
    .btn-secondary:hover { background: #d1d5db; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .todo-section { background: #fff; border-radius: 10px; padding: 24px; border: 1px solid #e0e0e0; }
    .todo-section h3 { font-size: 13px; color: #888; text-transform: uppercase; margin-bottom: 14px; }
    .add-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .add-row input { flex: 1; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
    .add-row input:focus { outline: 2px solid #4f46e5; border-color: transparent; }
    .todo-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
    .todo-item:last-child { border-bottom: none; }
    .todo-item input[type=checkbox] { width: auto; }
    .todo-item span.done { text-decoration: line-through; color: #aaa; }
    .todo-item .rm { background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px; padding: 2px; margin-left: auto; }
    .todo-item .rm:hover { color: #dc2626; }
    .devtools { width: 320px; }
    .devtools-panel { background: #1e1e2e; color: #cdd6f4; border-radius: 10px; padding: 20px; height: fit-content; position: sticky; top: 40px; }
    .devtools-panel h3 { color: #89b4fa; font-size: 14px; margin-bottom: 12px; }
    .state-view { font-size: 12px; font-family: monospace; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
    .action-log { margin-top: 14px; }
    .action-log h4 { font-size: 11px; color: #6c7086; text-transform: uppercase; margin-bottom: 8px; }
    .action-entry { font-size: 11px; padding: 4px 0; border-bottom: 1px solid #313244; font-family: monospace; }
    .action-entry:last-child { border-bottom: none; }
    .action-entry .at { color: #cba6f7; }
    .action-entry .ac { color: #a6e3a1; }
    .impl { background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 14px; font-size: 12px; font-family: monospace; white-space: pre-wrap; line-height: 1.6; margin-top: 16px; grid-column: 1 / -1; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { createContext, useContext, useReducer, useEffect, useRef, useState, useCallback, useMemo } = React;

    // ===== Mini Redux implementation =====
    function createStore(reducer, initialState) {
      let state = initialState;
      const subscribers = new Set();

      return {
        getState: () => state,
        dispatch: (action) => {
          state = reducer(state, action);
          subscribers.forEach(fn => fn(state));
        },
        subscribe: (fn) => {
          subscribers.add(fn);
          return () => subscribers.delete(fn);
        },
      };
    }

    const StoreContext = createContext(null);

    function Provider({ store, children }) {
      return <StoreContext.Provider value={store}>{children}</StoreContext.Provider>;
    }

    function useSelector(selector) {
      const store = useContext(StoreContext);
      const [selected, setSelected] = useState(() => selector(store.getState()));
      const selectorRef = useRef(selector);
      useEffect(() => { selectorRef.current = selector; }, [selector]);

      useEffect(() => {
        return store.subscribe((state) => {
          const next = selectorRef.current(state);
          setSelected(prev => {
            // Shallow equality check to avoid re-renders
            if (prev === next) return prev;
            return next;
          });
        });
      }, [store]);

      return selected;
    }

    function useDispatch() {
      return useContext(StoreContext).dispatch;
    }

    // ===== Reducers =====
    function rootReducer(state, action) {
      switch (action.type) {
        case 'INCREMENT': return { ...state, count: state.count + (action.payload || 1) };
        case 'DECREMENT': return { ...state, count: state.count - (action.payload || 1) };
        case 'RESET_COUNT': return { ...state, count: 0 };
        case 'ADD_TODO': return { ...state, todos: [...state.todos, { id: Date.now(), text: action.payload, done: false }] };
        case 'TOGGLE_TODO': return { ...state, todos: state.todos.map(t => t.id === action.payload ? { ...t, done: !t.done } : t) };
        case 'REMOVE_TODO': return { ...state, todos: state.todos.filter(t => t.id !== action.payload) };
        default: return state;
      }
    }

    const store = createStore(rootReducer, {
      count: 0,
      todos: [{ id: 1, text: 'Learn Mini Redux', done: false }, { id: 2, text: 'Build a real app', done: false }],
    });

    // ===== Connected Components =====
    function Counter() {
      const count = useSelector(s => s.count);
      const dispatch = useDispatch();
      return (
        <div className="counter-section">
          <h3>Counter</h3>
          <div className="count-display">{count}</div>
          <div className="btn-row">
            <button className="btn-primary" onClick={() => dispatch({ type: 'DECREMENT' })}>−1</button>
            <button className="btn-primary" onClick={() => dispatch({ type: 'INCREMENT' })}>+1</button>
            <button className="btn-primary" onClick={() => dispatch({ type: 'INCREMENT', payload: 5 })}>+5</button>
            <button className="btn-danger" onClick={() => dispatch({ type: 'RESET_COUNT' })}>Reset</button>
          </div>
        </div>
      );
    }

    function TodoList() {
      const todos = useSelector(s => s.todos);
      const dispatch = useDispatch();
      const [input, setInput] = useState('');

      function add() {
        if (!input.trim()) return;
        dispatch({ type: 'ADD_TODO', payload: input.trim() });
        setInput('');
      }

      return (
        <div className="todo-section">
          <h3>Todos</h3>
          <div className="add-row">
            <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && add()} placeholder="New todo..." />
            <button className="btn-primary" onClick={add}>Add</button>
          </div>
          {todos.map(todo => (
            <div className="todo-item" key={todo.id}>
              <input type="checkbox" checked={todo.done} onChange={() => dispatch({ type: 'TOGGLE_TODO', payload: todo.id })} />
              <span className={todo.done ? 'done' : ''}>{todo.text}</span>
              <button className="rm" onClick={() => dispatch({ type: 'REMOVE_TODO', payload: todo.id })}>✕</button>
            </div>
          ))}
        </div>
      );
    }

    function DevTools() {
      const state = useSelector(s => s);
      const [actionLog, setActionLog] = useState([]);
      const storeRef = useContext(StoreContext);

      useEffect(() => {
        const origDispatch = storeRef.dispatch.bind(storeRef);
        storeRef.dispatch = (action) => {
          setActionLog(prev => [{ action: action.type, payload: action.payload, time: new Date().toLocaleTimeString() }, ...prev].slice(0, 10));
          origDispatch(action);
        };
      }, []);

      return (
        <div className="devtools-panel">
          <h3>🛠 DevTools</h3>
          <div className="state-view">{JSON.stringify(state, null, 2)}</div>
          <div className="action-log">
            <h4>Action Log</h4>
            {actionLog.length === 0 && <div style={{ color: '#6c7086', fontSize: 12 }}>No actions dispatched yet</div>}
            {actionLog.map((a, i) => (
              <div key={i} className="action-entry">
                <span className="at">[{a.time}]</span> <span className="ac">{a.action}</span>{a.payload !== undefined ? ` (${JSON.stringify(a.payload)})` : ''}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function App() {
      return (
        <Provider store={store}>
          <h1>27 — Mini Redux</h1>
          <p className="desc">Features: createStore (getState/dispatch/subscribe), Provider, useSelector (with re-render optimization), useDispatch, DevTools panel.</p>
          <div className="app-layout">
            <div className="main-panel">
              <Counter />
              <TodoList />
            </div>
            <div className="devtools">
              <DevTools />
            </div>
          </div>
        </Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
