<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>04 - Virtualized List</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    h1 { margin-bottom: 8px; }
    p.desc { color: #666; margin-bottom: 24px; }
    .info { margin-bottom: 12px; font-size: 13px; color: #4f46e5; font-weight: 500; }
    .list-container { width: 480px; height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; background: #fff; position: relative; }
    .list-inner { position: relative; }
    .list-row { position: absolute; left: 0; right: 0; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .list-row:nth-child(even) { background: #f9f9f9; }
    .row-index { width: 60px; color: #999; font-size: 12px; }
    .row-name { font-weight: 500; margin-right: 12px; }
    .row-email { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    const ITEM_HEIGHT = 48;
    const OVERSCAN = 5;
    const TOTAL_ITEMS = 10000;

    // Generate data once
    const allItems = Array.from({ length: TOTAL_ITEMS }, (_, i) => ({
      id: i,
      name: `User ${i + 1}`,
      email: `user${i + 1}@example.com`,
    }));

    function VirtualizedList({ items, itemHeight, containerHeight }) {
      const [scrollTop, setScrollTop] = useState(0);
      const containerRef = useRef(null);

      const totalHeight = items.length * itemHeight;
      const visibleCount = Math.ceil(containerHeight / itemHeight);
      const startIndex = Math.max(0, Math.floor(scrollTop / itemHeight) - OVERSCAN);
      const endIndex = Math.min(items.length - 1, startIndex + visibleCount + OVERSCAN * 2);

      const visibleItems = items.slice(startIndex, endIndex + 1);

      function onScroll(e) {
        setScrollTop(e.currentTarget.scrollTop);
      }

      return (
        <div
          className="list-container"
          ref={containerRef}
          onScroll={onScroll}
          style={{ height: containerHeight }}
        >
          <div className="list-inner" style={{ height: totalHeight }}>
            {visibleItems.map(item => (
              <div
                key={item.id}
                className="list-row"
                style={{ top: item.id * itemHeight, height: itemHeight }}
              >
                <span className="row-index">#{item.id + 1}</span>
                <span className="row-name">{item.name}</span>
                <span className="row-email">{item.email}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function RenderedCount({ scrollTop }) {
      const visibleCount = Math.ceil(400 / ITEM_HEIGHT);
      const startIndex = Math.max(0, Math.floor(scrollTop / ITEM_HEIGHT) - OVERSCAN);
      const endIndex = Math.min(TOTAL_ITEMS - 1, startIndex + visibleCount + OVERSCAN * 2);
      return (
        <p className="info">
          Rendering rows {startIndex + 1}–{endIndex + 1} of {TOTAL_ITEMS.toLocaleString()} (DOM nodes: ~{endIndex - startIndex + 1})
        </p>
      );
    }

    function App() {
      const [scrollInfo, setScrollInfo] = useState(0);

      return (
        <div>
          <h1>04 — Virtualized List</h1>
          <p className="desc">Features: Only visible rows are in the DOM. Renders 10,000 items with minimal DOM nodes. Built from scratch — no library.</p>
          <p className="info">Total items: {TOTAL_ITEMS.toLocaleString()} | Item height: {ITEM_HEIGHT}px | Overscan: {OVERSCAN}</p>
          <VirtualizedList items={allItems} itemHeight={ITEM_HEIGHT} containerHeight={400} />
          <p style={{ marginTop: 10, fontSize: 13, color: '#888' }}>Scroll the list — only ~{Math.ceil(400/ITEM_HEIGHT) + OVERSCAN*2} rows exist in the DOM at any time.</p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
