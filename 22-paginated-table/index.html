<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>22 - Paginated Data Table</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    h1 { margin-bottom: 8px; }
    p.desc { color: #666; margin-bottom: 24px; }
    .toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .search-input { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; width: 200px; }
    .search-input:focus { outline: 2px solid #4f46e5; border-color: transparent; }
    select { padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; }
    .count { font-size: 13px; color: #888; margin-left: auto; }
    .table-wrap { background: #fff; border-radius: 10px; border: 1px solid #e0e0e0; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f9fafb; padding: 11px 14px; text-align: left; font-weight: 600; color: #374151; border-bottom: 1px solid #e0e0e0; white-space: nowrap; user-select: none; }
    th.sortable { cursor: pointer; }
    th.sortable:hover { background: #f0f0f0; }
    th .sort-icon { margin-left: 4px; color: #aaa; }
    th.sorted .sort-icon { color: #4f46e5; }
    td { padding: 10px 14px; border-bottom: 1px solid #f5f5f5; color: #374151; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-inactive { background: #f3f4f6; color: #6b7280; }
    .badge-dev { background: #dbeafe; color: #1e40af; }
    .badge-design { background: #ede9fe; color: #5b21b6; }
    .badge-mgr { background: #fef3c7; color: #92400e; }
    .badge-qa { background: #fce7f3; color: #9d174d; }
    .pagination { display: flex; gap: 4px; justify-content: center; padding: 16px; align-items: center; }
    .page-btn { width: 34px; height: 34px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    .page-btn:hover:not(:disabled):not(.active) { background: #f0f0f0; }
    .page-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-info { font-size: 13px; color: #888; margin: 0 8px; }
    .no-data { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const DEPTS = ['Engineering', 'Design', 'Management', 'QA'];
    const NAMES = ['Alice','Bob','Charlie','Diana','Eve','Frank','Grace','Hank','Ivy','Jack','Karen','Leo','Mia','Nate','Olivia','Paul','Quinn','Rose','Sam','Tina','Uma','Victor','Wendy','Xander','Yara','Zoe'];

    const data = Array.from({ length: 100 }, (_, i) => ({
      id: i + 1,
      name: NAMES[i % NAMES.length] + ' ' + String.fromCharCode(65 + (i % 26)),
      dept: DEPTS[i % 4],
      role: ['Developer', 'Designer', 'Manager', 'QA Engineer'][i % 4],
      salary: Math.round((50 + Math.random() * 100) * 1000),
      joined: new Date(2018 + Math.floor(i / 20), i % 12, (i % 28) + 1).toLocaleDateString(),
      status: i % 5 === 0 ? 'Inactive' : 'Active',
    }));

    const DEPT_BADGES = { Engineering: 'badge-dev', Design: 'badge-design', Management: 'badge-mgr', QA: 'badge-qa' };

    const COLUMNS = [
      { key: 'id', label: '#', sortable: true },
      { key: 'name', label: 'Name', sortable: true },
      { key: 'dept', label: 'Department', sortable: true },
      { key: 'role', label: 'Role', sortable: true },
      { key: 'salary', label: 'Salary', sortable: true },
      { key: 'joined', label: 'Joined', sortable: false },
      { key: 'status', label: 'Status', sortable: true },
    ];

    function App() {
      const [search, setSearch] = useState('');
      const [deptFilter, setDeptFilter] = useState('All');
      const [sort, setSort] = useState({ key: 'id', dir: 'asc' });
      const [page, setPage] = useState(1);
      const [pageSize, setPageSize] = useState(10);

      function handleSort(key) {
        setSort(s => s.key === key ? { key, dir: s.dir === 'asc' ? 'desc' : 'asc' } : { key, dir: 'asc' });
        setPage(1);
      }

      const filtered = useMemo(() => {
        let rows = data;
        if (deptFilter !== 'All') rows = rows.filter(r => r.dept === deptFilter);
        if (search.trim()) {
          const q = search.toLowerCase();
          rows = rows.filter(r => r.name.toLowerCase().includes(q) || r.role.toLowerCase().includes(q));
        }
        rows = [...rows].sort((a, b) => {
          const va = a[sort.key], vb = b[sort.key];
          const cmp = typeof va === 'number' ? va - vb : String(va).localeCompare(String(vb));
          return sort.dir === 'asc' ? cmp : -cmp;
        });
        return rows;
      }, [search, deptFilter, sort]);

      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      const safePage = Math.min(page, totalPages);
      const pageData = filtered.slice((safePage - 1) * pageSize, safePage * pageSize);

      function sortIcon(key) {
        if (sort.key !== key) return '↕';
        return sort.dir === 'asc' ? '↑' : '↓';
      }

      const pageButtons = () => {
        const btns = [];
        const start = Math.max(1, safePage - 2);
        const end = Math.min(totalPages, safePage + 2);
        if (start > 1) { btns.push(1); if (start > 2) btns.push('...'); }
        for (let i = start; i <= end; i++) btns.push(i);
        if (end < totalPages) { if (end < totalPages - 1) btns.push('...'); btns.push(totalPages); }
        return btns;
      };

      return (
        <div>
          <h1>22 — Paginated Data Table</h1>
          <p className="desc">Features: Client-side sort (asc/desc), multi-column filter, search, pagination with page window, rows-per-page selector.</p>

          <div className="toolbar">
            <input className="search-input" value={search} onChange={e => { setSearch(e.target.value); setPage(1); }} placeholder="Search name or role..." />
            <select value={deptFilter} onChange={e => { setDeptFilter(e.target.value); setPage(1); }}>
              <option>All</option>
              {DEPTS.map(d => <option key={d}>{d}</option>)}
            </select>
            <select value={pageSize} onChange={e => { setPageSize(+e.target.value); setPage(1); }}>
              <option value={5}>5 per page</option>
              <option value={10}>10 per page</option>
              <option value={25}>25 per page</option>
            </select>
            <span className="count">{filtered.length} results</span>
          </div>

          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  {COLUMNS.map(col => (
                    <th
                      key={col.key}
                      className={`${col.sortable ? 'sortable' : ''} ${sort.key === col.key ? 'sorted' : ''}`}
                      onClick={() => col.sortable && handleSort(col.key)}
                    >
                      {col.label}
                      {col.sortable && <span className="sort-icon">{sortIcon(col.key)}</span>}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {pageData.length === 0 ? (
                  <tr><td colSpan={7} className="no-data">No results found</td></tr>
                ) : (
                  pageData.map(row => (
                    <tr key={row.id}>
                      <td>{row.id}</td>
                      <td style={{ fontWeight: 500 }}>{row.name}</td>
                      <td><span className={`badge ${DEPT_BADGES[row.dept]}`}>{row.dept}</span></td>
                      <td>{row.role}</td>
                      <td>${row.salary.toLocaleString()}</td>
                      <td>{row.joined}</td>
                      <td><span className={`badge ${row.status === 'Active' ? 'badge-active' : 'badge-inactive'}`}>{row.status}</span></td>
                    </tr>
                  ))
                )}
              </tbody>
            </table>
          </div>

          <div className="pagination">
            <button className="page-btn" onClick={() => setPage(1)} disabled={safePage === 1}>«</button>
            <button className="page-btn" onClick={() => setPage(p => p - 1)} disabled={safePage === 1}>‹</button>
            {pageButtons().map((btn, i) => (
              btn === '...'
                ? <span key={i} style={{ padding: '0 4px', color: '#aaa' }}>...</span>
                : <button key={btn} className={`page-btn ${safePage === btn ? 'active' : ''}`} onClick={() => setPage(btn)}>{btn}</button>
            ))}
            <button className="page-btn" onClick={() => setPage(p => p + 1)} disabled={safePage === totalPages}>›</button>
            <button className="page-btn" onClick={() => setPage(totalPages)} disabled={safePage === totalPages}>»</button>
            <span className="page-info">Page {safePage} of {totalPages}</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
