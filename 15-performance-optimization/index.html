<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>15 - Performance Optimization</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
    h1 { margin-bottom: 8px; }
    p.desc { color: #666; margin-bottom: 24px; }
    .layout { display: flex; gap: 24px; }
    .side { width: 480px; }
    .side h2 { font-size: 15px; margin-bottom: 12px; padding: 8px 12px; border-radius: 6px; }
    .side.bad h2 { background: #fee2e2; color: #991b1b; }
    .side.good h2 { background: #d1fae5; color: #065f46; }
    .controls { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    button { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; background: #4f46e5; color: #fff; }
    button:hover { background: #4338ca; }
    button.secondary { background: #e5e7eb; color: #333; }
    button.secondary:hover { background: #d1d5db; }
    input { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; width: 180px; }
    .render-log { background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 14px; font-size: 12px; font-family: monospace; height: 280px; overflow-y: auto; }
    .log-entry { padding: 2px 0; }
    .log-entry.highlight { color: #f38ba8; }
    .log-entry.ok { color: #a6e3a1; }
    .total { margin-top: 8px; font-size: 12px; }
    .total span { color: #f38ba8; font-weight: 700; }
    .total span.good { color: #a6e3a1; }
    .derived { background: #fff; border-radius: 6px; padding: 10px 12px; border: 1px solid #e0e0e0; margin-bottom: 12px; font-size: 13px; }
    .derived strong { color: #4f46e5; }
    .note { background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #92400e; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useCallback, memo, useRef } = React;

    // Expensive computation — O(n) on large list
    function computeStats(items) {
      const start = performance.now();
      // Simulate heavy work
      let sum = 0;
      for (let i = 0; i < 1e6; i++) sum += Math.sqrt(i);
      const total = items.reduce((s, i) => s + i.price, 0);
      const avg = total / (items.length || 1);
      const max = Math.max(...items.map(i => i.price));
      const elapsed = (performance.now() - start).toFixed(1);
      return { total: total.toFixed(2), avg: avg.toFixed(2), max, elapsed };
    }

    const ITEMS = Array.from({ length: 50 }, (_, i) => ({ id: i, name: `Item ${i + 1}`, price: Math.round(Math.random() * 100 + 1) }));

    // ---- BAD VERSION ----
    function BadExpensiveComponent({ items, renderLog }) {
      const stats = computeStats(items); // recomputes every render
      renderLog('BadExpensiveComponent');
      return (
        <div className="derived">
          Total: <strong>${stats.total}</strong> | Avg: <strong>${stats.avg}</strong> | Max: <strong>${stats.max}</strong>
          <span style={{ color: '#dc2626', marginLeft: 10, fontSize: 11 }}>computed in {stats.elapsed}ms</span>
        </div>
      );
    }

    function BadChild({ onAdd, renderLog }) {
      renderLog('BadChild (button)');
      return <button onClick={onAdd}>+ Add Item (Bad)</button>;
    }

    // ---- GOOD VERSION ----
    const GoodExpensiveComponent = memo(({ items, renderLog }) => {
      const stats = useMemo(() => computeStats(items), [items]); // only recomputes when items changes
      renderLog('GoodExpensiveComponent ✓');
      return (
        <div className="derived">
          Total: <strong>${stats.total}</strong> | Avg: <strong>${stats.avg}</strong> | Max: <strong>${stats.max}</strong>
          <span style={{ color: '#059669', marginLeft: 10, fontSize: 11 }}>computed in {stats.elapsed}ms</span>
        </div>
      );
    });

    const GoodChild = memo(({ onAdd, renderLog }) => {
      renderLog('GoodChild (button) ✓');
      return <button onClick={onAdd}>+ Add Item (Good)</button>;
    });

    function App() {
      const [unrelatedState, setUnrelatedState] = useState(0);
      const [items, setItems] = useState(ITEMS.slice(0, 5));
      const [filter, setFilter] = useState('');
      const badLog = useRef([]);
      const goodLog = useRef([]);
      const [, forceRender] = useState(0);

      function logBad(name) {
        badLog.current = [`${name} — ${new Date().toLocaleTimeString()}`, ...badLog.current].slice(0, 20);
      }
      function logGood(name) {
        goodLog.current = [`${name} — ${new Date().toLocaleTimeString()}`, ...goodLog.current].slice(0, 20);
      }

      // BAD: new function reference every render
      function badAdd() { setItems(prev => [...prev, { id: Date.now(), name: 'New', price: 50 }]); }

      // GOOD: stable reference with useCallback
      const goodAdd = useCallback(() => {
        setItems(prev => [...prev, { id: Date.now(), name: 'New', price: 50 }]);
      }, []); // no deps — setItems is stable

      function triggerUnrelated() {
        setUnrelatedState(n => n + 1);
        forceRender(n => n + 1);
      }

      // Render both sides
      logBad('Parent');
      logGood('Parent');

      return (
        <div>
          <h1>15 — Performance Optimization</h1>
          <p className="desc">Features: React.memo, useMemo (skip expensive recompute), useCallback (stable function refs). Render counter shows the difference.</p>

          <div className="controls" style={{ marginBottom: 20 }}>
            <button className="secondary" onClick={triggerUnrelated}>🔄 Trigger Unrelated Re-render (count: {unrelatedState})</button>
          </div>
          <p className="note" style={{ marginBottom: 20, maxWidth: 960 }}>
            Click "Trigger Unrelated Re-render" — the BAD side re-renders ALL children and recomputes stats even though items didn't change. The GOOD side skips both.
          </p>

          <div className="layout">
            <div className="side bad">
              <h2>❌ Bad — No memo/useMemo/useCallback</h2>
              <div className="controls">
                <BadChild onAdd={badAdd} renderLog={logBad} />
              </div>
              <BadExpensiveComponent items={items} renderLog={logBad} />
              <div className="render-log">
                {badLog.current.map((e, i) => <div key={i} className={`log-entry ${e.includes('Expensive') ? 'highlight' : ''}`}>{e}</div>)}
              </div>
              <p className="total">Total renders logged: <span>{badLog.current.length}</span></p>
            </div>

            <div className="side good">
              <h2>✅ Good — memo + useMemo + useCallback</h2>
              <div className="controls">
                <GoodChild onAdd={goodAdd} renderLog={logGood} />
              </div>
              <GoodExpensiveComponent items={items} renderLog={logGood} />
              <div className="render-log">
                {goodLog.current.map((e, i) => <div key={i} className={`log-entry ${e.includes('✓') ? 'ok' : ''}`}>{e}</div>)}
              </div>
              <p className="total">Total renders logged: <span className="good">{goodLog.current.length}</span></p>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
